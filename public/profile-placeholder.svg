<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title description">
  <title id="title">Profilbild-Platzhalter</title>
  <desc id="description">Abstrakter Platzhalter für das spätere Portrait von D. Henschel.</desc>
  <defs>
    <linearGradient id="background" x1="80" y1="50" x2="720" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C8F8EB"/>
      <stop offset="0.52" stop-color="#72DEC6"/>
      <stop offset="1" stop-color="#3E9FA8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(250 170) rotate(46) scale(570)">
      <stop stop-color="#FFFFFF" stop-opacity=".75"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#103642" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="800" height="800" rx="160" fill="url(#background)"/>
  <rect width="800" height="800" rx="160" fill="url(#glow)"/>
  <g opacity=".12" stroke="#12313C">
    <path d="M0 160h800M0 320h800M0 480h800M0 640h800"/>
    <path d="M160 0v800M320 0v800M480 0v800M640 0v800"/>
  </g>
  <g filter="url(#shadow)" fill="#101923">
    <circle cx="400" cy="310" r="132"/>
    <path d="M157 716c22-154 113-245 243-245s221 91 243 245H157Z"/>
  </g>
  <circle cx="625" cy="145" r="26" fill="#FFFFFF" fill-opacity=".82"/>
  <path d="M100 686h600" stroke="#FFFFFF" stroke-opacity=".34" stroke-width="4" stroke-linecap="round"/>
</svg>
