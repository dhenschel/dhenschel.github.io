<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">D. Henschel – Software Developer</title>
  <desc id="description">Portfolio-Vorschau im dunkelblauen Stil einer modernen Spielkonsolen-Oberfläche.</desc>
  <defs>
    <clipPath id="profile-clip">
      <circle cx="832" cy="303" r="64" />
    </clipPath>
    <filter id="profile-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feFlood flood-color="#2488ff" flood-opacity=".55" />
      <feComposite in2="blur" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <image href="social-card-background.webp" xlink:href="social-card-background.webp" width="1200" height="630" preserveAspectRatio="xMidYMid slice" />

  <circle cx="832" cy="303" r="67" fill="none" stroke="#2488ff" stroke-width="4" filter="url(#profile-glow)" />
  <image href="dhenschel.jpg" xlink:href="dhenschel.jpg" x="768" y="239" width="128" height="128" preserveAspectRatio="xMidYMid slice" clip-path="url(#profile-clip)" />

  <circle cx="85" cy="78" r="33" fill="#2488ff" />
  <text x="85" y="85" fill="#fff" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="18" font-weight="800" text-anchor="middle">DH</text>

  <text x="72" y="259" fill="#f5f8ff" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="76" font-weight="800" letter-spacing="-2">D. Henschel</text>
  <text x="76" y="320" fill="#adbbcf" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="25" font-weight="700" letter-spacing="3">SOFTWARE DEVELOPER</text>

  <rect x="74" y="371" width="241" height="58" rx="29" fill="#132d50" stroke="#b5d2f5" stroke-opacity=".2" />
  <circle cx="106" cy="400" r="7" fill="#2fcf76" />
  <circle cx="106" cy="400" r="13" fill="#2fcf76" opacity=".12" />
  <text x="128" y="408" fill="#f5f8ff" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="22" font-weight="700">dhenschel.de</text>
</svg>
